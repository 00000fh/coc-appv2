name: coc

description: "A new Flutter project."

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Backend / Database
  supabase_flutter: ^2.12.4

  # Navigation
  go_router: ^17.2.3

  # Location
  geolocator: ^14.0.2

  # Media / Upload
  image_picker: ^1.2.2

  # Signature
  signature: ^6.3.0

  # PDF / Printing
  pdf: ^3.12.0
  printing: ^5.14.3

  # File handling
  path_provider: ^2.1.5
  open_filex: ^4.5.0

  # Fonts
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  # App icon generator
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/images/coclogo.png

flutter:
  uses-material-design: true

  assets:
    - assets/images/coclogo.png